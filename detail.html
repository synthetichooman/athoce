<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="product detail from athoce seoul, a shop in mangwon-dong, seoul."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#ffffff" />
    <link id="canonicalUrl" rel="canonical" href="https://athoce.kr/detail.html" />
    <link rel="preconnect" href="https://cdn-optimized.imweb.me" crossorigin />
    <link rel="dns-prefetch" href="https://cdn-optimized.imweb.me" />
    <meta property="og:type" content="product" />
    <meta property="og:site_name" content="athoce" />
    <meta property="og:title" content="athoce product" />
    <meta
      property="og:description"
      content="product detail from athoce seoul, a shop in mangwon-dong, seoul"
    />
    <meta property="og:image" content="https://athoce.kr/assets/athoce-og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://athoce.kr/detail.html" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="athoce product" />
    <meta name="twitter:description" content="product detail from athoce seoul" />
    <meta name="twitter:image" content="https://athoce.kr/assets/athoce-og.png" />
    <title>athoce product</title>
    <style>
      :root {
        color: #111;
        background: #fff;
        font-family:
          Arial, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      a {
        color: inherit;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid #000;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(14px);
      }

      .site-header-inner {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        width: min(1440px, calc(100% - 28px));
        margin: 0 auto;
        min-height: 54px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: inherit;
        text-decoration: none;
      }

      .brand img {
        display: block;
        width: auto;
        height: 44px;
      }

      main {
        width: min(1440px, calc(100% - 28px));
        margin: 0 auto;
        padding: 22px 0 72px;
      }

      .product-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
        gap: 28px;
        align-items: start;
      }

      .gallery-wrap {
        min-width: 0;
        display: grid;
        gap: 10px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .media {
        width: 100%;
        aspect-ratio: 4 / 5;
        overflow: hidden;
        background: #f5f5f5;
      }

      .media img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .product-layout.is-unavailable .media img {
        filter: blur(7px) grayscale(0.28);
        transform: scale(1.032);
      }

      .gallery-controls {
        display: none;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
      }

      .gallery-count {
        color: #8a8a8a;
        font-size: 13px;
        line-height: 1;
      }

      .gallery-buttons {
        display: flex;
        gap: 8px;
      }

      .gallery-button {
        width: 28px;
        min-height: 28px;
        padding: 0;
        border: 1px solid #111;
        border-radius: 0;
        background: #fff;
        color: #111;
        font: inherit;
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
      }

      .gallery-button:disabled {
        border-color: #d8d8d8;
        color: #b8b8b8;
        cursor: default;
      }

      .summary {
        position: sticky;
        top: 76px;
        display: grid;
        gap: 24px;
        padding-left: 20px;
      }

      .summary-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 8px 16px;
      }

      h1,
      .price,
      .meta,
      .description,
      .empty,
      .error,
      .buy {
        font-size: 13px;
        line-height: 1.45;
      }

      h1,
      .price,
      .meta {
        margin: 0;
      }

      h1 {
        min-width: 0;
        font-weight: 400;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .price {
        white-space: nowrap;
      }

      .meta {
        grid-column: 1 / -1;
        color: #8a8a8a;
        text-transform: lowercase;
      }

      .buy {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border: 1px solid #111;
        background: #111;
        color: #fff;
        text-decoration: none;
        text-transform: lowercase;
      }

      .buy[aria-disabled="true"] {
        pointer-events: none;
        border-color: #d8d8d8;
        background: #f3f3f3;
        color: #8a8a8a;
      }

      .description {
        display: grid;
        gap: 12px;
        color: #333;
      }

      .description:empty {
        display: none;
      }

      .description p {
        margin: 0;
      }

      .description img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      .empty,
      .error {
        min-height: 180px;
        padding: 18px 0;
        border-top: 1px solid #000;
        color: #6f6f6f;
      }

      .error {
        color: #b3261e;
      }

      @media (max-width: 860px) {
        .product-layout {
          grid-template-columns: 1fr;
          gap: 26px;
        }

        .gallery {
          display: flex;
          overflow-x: auto;
          overscroll-behavior-x: contain;
          scroll-behavior: smooth;
          scroll-snap-type: x mandatory;
          scrollbar-width: none;
        }

        .gallery::-webkit-scrollbar {
          display: none;
        }

        .media {
          flex: 0 0 100%;
          scroll-snap-align: start;
        }

        .gallery-controls {
          display: grid;
        }

        .summary {
          position: static;
          padding-left: 0;
        }
      }

      @media (max-width: 560px) {
        .site-header-inner,
        main {
          width: calc(100% - 20px);
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="./" aria-label="athoce home">
          <img src="assets/athoce-symbol.svg" alt="" />
        </a>
      </div>
    </header>

    <main>
      <section id="detail" aria-live="polite"></section>
    </main>

    <script>
      const ORIGINAL_SHOP_BASE_URL = 'https://hooman.kr';
      const detailEl = document.querySelector('#detail');
      const priceFormatter = new Intl.NumberFormat('ko-KR');
      const params = new URLSearchParams(window.location.search);
      const prodNo = params.get('prodNo');

      function pickFirst(...values) {
        return values.find((value) => value !== undefined && value !== null && value !== '');
      }

      function formatDisplayText(value) {
        return String(value || '').replace(/[A-Z]/g, (letter) => letter.toLowerCase());
      }

      function getProductName(product) {
        return formatDisplayText(
          pickFirst(product.name, product.productName, product.product_name, '이름 없는 상품'),
        );
      }

      function getProductPrice(product) {
        return Number(pickFirst(product.price, product.salePrice, product.sale_price, 0));
      }

      function getProductImages(product) {
        const images = pickFirst(product.productImages, product.images, product.imageList, []);
        if (Array.isArray(images)) {
          return images
            .map((image) => pickFirst(image?.url, image?.image_url, image))
            .filter(Boolean);
        }

        return [images].filter(Boolean);
      }

      function getOptimizedImwebImageUrl(imageUrl, width = 1200) {
        try {
          const url = new URL(imageUrl);

          if (!['cdn.imweb.me', 'cdn-optimized.imweb.me'].includes(url.hostname)) {
            return imageUrl;
          }

          url.hostname = 'cdn-optimized.imweb.me';
          url.searchParams.set('w', String(width));
          return url.toString();
        } catch {
          return imageUrl;
        }
      }

      function getImageSrcSet(imageUrl) {
        return [750, 1200, 1600]
          .map((width) => `${getOptimizedImwebImageUrl(imageUrl, width)} ${width}w`)
          .join(', ');
      }

      function isUnavailable(product) {
        const status = String(product.prodStatus || '').toLowerCase();
        const stockUse = String(product.stockUse || '').toUpperCase() === 'Y';
        const stockUnlimit = String(product.stockUnlimit || '').toUpperCase() === 'Y';
        const stock = Number(product.stockNoOption ?? product.stock ?? product.stockCount);

        return (
          status === 'soldout' ||
          status === 'nosale' ||
          (stockUse && !stockUnlimit && Number.isFinite(stock) && stock <= 0)
        );
      }

      function getOriginalProductUrl(product) {
        const id = pickFirst(product.prodNo, product.idx, prodNo);
        return pickFirst(
          product.url,
          product.productUrl,
          product.product_url,
          id ? `${ORIGINAL_SHOP_BASE_URL}/shop_view/?idx=${encodeURIComponent(id)}` : null,
          ORIGINAL_SHOP_BASE_URL,
        );
      }

      function stripHtml(value) {
        const container = document.createElement('div');
        container.innerHTML = String(value || '');
        return container.textContent.replace(/\s+/g, ' ').trim();
      }

      function setMeta(selector, attribute, value) {
        if (!value) {
          return;
        }

        const element = document.head.querySelector(selector);

        if (element) {
          element.setAttribute(attribute, value);
        }
      }

      function upsertProductJsonLd(product, images, name, price, unavailable) {
        const productUrl = prodNo
          ? `https://athoce.kr/detail.html?prodNo=${encodeURIComponent(prodNo)}`
          : 'https://athoce.kr/detail.html';
        const jsonLd = {
          '@context': 'https://schema.org',
          '@type': 'Product',
          name,
          image: images.map((imageUrl) => getOptimizedImwebImageUrl(imageUrl, 1200)),
          description:
            stripHtml(pickFirst(product.content, product.simpleContent, product.mobileContent, '')) ||
            `${name} product detail from athoce seoul.`,
          sku: String(pickFirst(product.prodNo, product.prodCode, prodNo, '')),
          brand: {
            '@type': 'Brand',
            name: 'athoce seoul',
          },
          url: productUrl,
          offers: {
            '@type': 'Offer',
            url: getOriginalProductUrl(product),
            priceCurrency: 'KRW',
            availability: unavailable
              ? 'https://schema.org/OutOfStock'
              : 'https://schema.org/InStock',
          },
        };

        if (price) {
          jsonLd.offers.price = String(price);
        }

        let script = document.querySelector('#productJsonLd');

        if (!script) {
          script = document.createElement('script');
          script.type = 'application/ld+json';
          script.id = 'productJsonLd';
          document.head.append(script);
        }

        script.textContent = JSON.stringify(jsonLd);
      }

      function updateSeo(product, images, name, price, unavailable) {
        const productUrl = prodNo
          ? `https://athoce.kr/detail.html?prodNo=${encodeURIComponent(prodNo)}`
          : 'https://athoce.kr/detail.html';
        const description =
          stripHtml(pickFirst(product.simpleContent, product.content, product.mobileContent, ''))
            .slice(0, 150) || `${name} product detail from athoce seoul.`;
        const imageUrl = images[0] ? getOptimizedImwebImageUrl(images[0], 1200) : '';
        const title = `${name} | athoce`;

        document.title = title;
        setMeta('meta[name="description"]', 'content', description);
        setMeta('meta[property="og:title"]', 'content', title);
        setMeta('meta[property="og:description"]', 'content', description);
        setMeta('meta[property="og:url"]', 'content', productUrl);
        setMeta('meta[name="twitter:title"]', 'content', title);
        setMeta('meta[name="twitter:description"]', 'content', description);

        if (imageUrl) {
          let ogImage = document.head.querySelector('meta[property="og:image"]');
          let twitterImage = document.head.querySelector('meta[name="twitter:image"]');

          if (!ogImage) {
            ogImage = document.createElement('meta');
            ogImage.setAttribute('property', 'og:image');
            document.head.append(ogImage);
          }

          if (!twitterImage) {
            twitterImage = document.createElement('meta');
            twitterImage.setAttribute('name', 'twitter:image');
            document.head.append(twitterImage);
          }

          ogImage.setAttribute('content', imageUrl);
          twitterImage.setAttribute('content', imageUrl);
        }

        document.querySelector('#canonicalUrl')?.setAttribute('href', productUrl);
        upsertProductJsonLd(product, images, name, price, unavailable);
      }

      function updateGalleryState(galleryWrap) {
        const gallery = galleryWrap.querySelector('.gallery');
        const controls = galleryWrap.querySelector('.gallery-controls');
        const count = galleryWrap.querySelector('.gallery-count');
        const prev = galleryWrap.querySelector('[data-gallery-prev]');
        const next = galleryWrap.querySelector('[data-gallery-next]');
        const slides = [...gallery.querySelectorAll('.media')];
        const isSwipeMode = window.matchMedia('(max-width: 860px)').matches;

        if (!slides.length || !isSwipeMode) {
          controls.hidden = true;
          return;
        }

        controls.hidden = false;
        const index = Math.round(gallery.scrollLeft / gallery.clientWidth);
        const current = Math.min(Math.max(index, 0), slides.length - 1);
        count.textContent = `${current + 1} / ${slides.length}`;
        prev.disabled = current === 0;
        next.disabled = current === slides.length - 1;
      }

      function scrollGallery(galleryWrap, direction) {
        const gallery = galleryWrap.querySelector('.gallery');
        gallery.scrollBy({
          left: direction * gallery.clientWidth,
          behavior: 'smooth',
        });
      }

      function renderImages(galleryWrap, images, name) {
        const gallery = galleryWrap.querySelector('.gallery');

        if (!images.length) {
          gallery.innerHTML = '<div class="empty">등록된 상품 이미지가 없습니다.</div>';
          updateGalleryState(galleryWrap);
          return;
        }

        images.forEach((imageUrl, index) => {
          const media = document.createElement('div');
          media.className = 'media';

          const image = document.createElement('img');
          image.src = getOptimizedImwebImageUrl(imageUrl, index === 0 ? 1200 : 750);
          image.srcset = getImageSrcSet(imageUrl);
          image.sizes = '(max-width: 560px) calc(100vw - 20px), (max-width: 860px) calc(100vw - 28px), calc((100vw - 416px) / 2)';
          image.alt = name;
          image.referrerPolicy = 'no-referrer';
          image.loading = index === 0 ? 'eager' : 'lazy';
          image.decoding = 'async';
          image.fetchPriority = index === 0 ? 'high' : 'auto';

          media.append(image);
          gallery.append(media);
        });

        updateGalleryState(galleryWrap);
      }

      function render(product) {
        const images = getProductImages(product);
        const name = getProductName(product);
        const price = getProductPrice(product);
        const unavailable = isUnavailable(product);
        const content = pickFirst(product.content, product.simpleContent, product.mobileContent, '');
        updateSeo(product, images, name, price, unavailable);

        const wrapper = document.createElement('div');
        wrapper.className = `product-layout${unavailable ? ' is-unavailable' : ''}`;

        const galleryWrap = document.createElement('div');
        galleryWrap.className = 'gallery-wrap';
        galleryWrap.innerHTML = `
          <div class="gallery" aria-label="상품 이미지"></div>
          <div class="gallery-controls">
            <span class="gallery-count">1 / 1</span>
            <div class="gallery-buttons">
              <button class="gallery-button" type="button" data-gallery-prev aria-label="이전 이미지">‹</button>
              <button class="gallery-button" type="button" data-gallery-next aria-label="다음 이미지">›</button>
            </div>
          </div>
        `;
        renderImages(galleryWrap, images, name);

        const gallery = galleryWrap.querySelector('.gallery');
        gallery.addEventListener('scroll', () => updateGalleryState(galleryWrap), { passive: true });
        window.addEventListener('resize', () => updateGalleryState(galleryWrap), { passive: true });
        galleryWrap
          .querySelector('[data-gallery-prev]')
          .addEventListener('click', () => scrollGallery(galleryWrap, -1));
        galleryWrap
          .querySelector('[data-gallery-next]')
          .addEventListener('click', () => scrollGallery(galleryWrap, 1));

        const summary = document.createElement('aside');
        summary.className = 'summary';

        const summaryHead = document.createElement('div');
        summaryHead.className = 'summary-head';

        const title = document.createElement('h1');
        title.textContent = name;

        const priceEl = document.createElement('p');
        priceEl.className = 'price';
        priceEl.textContent = unavailable
          ? 'sold out'
          : price
            ? `${priceFormatter.format(price)}원`
            : '가격 문의';

        const metaEl = document.createElement('p');
        metaEl.className = 'meta';
        metaEl.textContent = prodNo ? `no. ${prodNo}` : '';

        summaryHead.append(title, priceEl, metaEl);

        const buy = document.createElement('a');
        buy.className = 'buy';
        buy.href = getOriginalProductUrl(product);
        buy.rel = 'noopener';
        buy.textContent = unavailable ? 'sold out' : 'purchase now in hooman.kr';

        if (unavailable) {
          buy.setAttribute('aria-disabled', 'true');
        } else {
          buy.target = '_blank';
        }

        const description = document.createElement('div');
        description.className = 'description';
        description.innerHTML = content;
        description.querySelectorAll('img').forEach((image, index) => {
          const source = image.getAttribute('src');

          if (!source) {
            return;
          }

          image.src = getOptimizedImwebImageUrl(source, 1200);
          image.srcset = getImageSrcSet(source);
          image.sizes = '(max-width: 860px) calc(100vw - 28px), 360px';
          image.loading = index === 0 ? 'eager' : 'lazy';
          image.decoding = 'async';
          image.fetchPriority = index === 0 ? 'high' : 'auto';
          image.referrerPolicy = 'no-referrer';
        });

        summary.append(summaryHead, buy, description);
        wrapper.append(galleryWrap, summary);
        detailEl.replaceChildren(wrapper);
      }

      async function loadProduct() {
        if (!prodNo) {
          detailEl.innerHTML = '<div class="error">상품 번호가 없습니다.</div>';
          return;
        }

        detailEl.innerHTML = '<div class="empty">상품을 불러오는 중</div>';

        try {
          const response = await fetch(`/api/product?prodNo=${encodeURIComponent(prodNo)}`, {
            credentials: 'same-origin',
            headers: { accept: 'application/json' },
          });
          const text = await response.text();
          const payload = text ? JSON.parse(text) : {};

          if (!response.ok || !payload.ok) {
            throw new Error(
              payload?.error?.message || `상품 상세 요청 실패: http ${response.status}`,
            );
          }

          render(payload.item);
        } catch (error) {
          detailEl.innerHTML = `<div class="error">${formatDisplayText(error.message)}</div>`;
        }
      }

      loadProduct();
    </script>
  </body>
</html>
