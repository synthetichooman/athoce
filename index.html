<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://cdn.imweb.me" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.imweb.me" />
    <title>athoce</title>
    <style>
      :root {
        color: #111;
        background: #fff;
        font-family:
          Arial, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      a {
        color: inherit;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid #e8e8e8;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(14px);
      }

      .site-header-inner {
        display: flex;
        justify-content: center;
        align-items: center;
        width: min(1440px, calc(100% - 28px));
        margin: 0 auto;
        min-height: 54px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: inherit;
        text-decoration: none;
      }

      .brand img {
        display: block;
        width: auto;
        height: 22px;
      }

      main {
        width: min(1440px, calc(100% - 28px));
        margin: 0 auto;
        padding: 22px 0 64px;
      }

      .filter-top {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 16px;
      }

      .filters {
        display: grid;
        gap: 12px;
        margin: 0 0 22px;
      }

      .category-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
      }

      .category-filters button {
        min-height: auto;
        padding: 0;
        border: 0;
        background: transparent;
        color: #777;
      }

      .category-filters button.is-active {
        color: #111;
        text-decoration: underline;
        text-underline-offset: 4px;
      }

      .soldout-filter {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        width: max-content;
        color: #555;
        font-size: 13px;
        line-height: 1;
        text-transform: lowercase;
      }

      .soldout-filter input {
        width: 14px;
        height: 14px;
        margin: 0;
        accent-color: #111;
      }

      #status {
        min-height: 15px;
        color: #111;
        font-size: 13px;
        line-height: 1.25;
        text-align: right;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 34px 10px;
      }

      .product {
        display: grid;
        gap: 10px;
        min-width: 0;
        color: inherit;
        text-decoration: none;
      }

      .product.is-unavailable .thumb img {
        filter: blur(7px) grayscale(0.28);
        transform: scale(1.032);
      }

      .thumb {
        position: relative;
        width: 100%;
        aspect-ratio: 4 / 5;
        overflow: hidden;
        background: #f5f5f5;
      }

      .thumb img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .thumb img + img {
        opacity: 0;
      }

      @media (hover: hover) and (pointer: fine) {
        .product.has-hover-image:hover .thumb img + img {
          opacity: 1;
        }
      }

      .info {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 6px 12px;
        padding-right: 2px;
      }

      .name,
      .price,
      .status {
        margin: 0;
        font-size: 13px;
        line-height: 1.35;
      }

      .name {
        min-width: 0;
        font-weight: 400;
        overflow-wrap: anywhere;
      }

      .price {
        color: #111;
        white-space: nowrap;
      }

      .status {
        grid-column: 1 / -1;
        color: #8a8a8a;
        text-transform: lowercase;
      }

      .empty,
      .error {
        min-height: 180px;
        padding: 18px 0;
        border-top: 1px solid #e8e8e8;
        color: #6f6f6f;
        font-size: 13px;
      }

      .error {
        color: #b3261e;
      }

      .more {
        display: flex;
        justify-content: center;
        margin-top: 42px;
      }

      .more[hidden] {
        display: none;
      }

      .rental-gate {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(255, 255, 255, 0.84);
        backdrop-filter: blur(10px);
      }

      .rental-gate[hidden] {
        display: none;
      }

      .rental-gate form {
        width: min(360px, 100%);
        display: grid;
        gap: 12px;
        border: 1px solid #e8e8e8;
        background: #fff;
        padding: 18px;
      }

      .rental-gate label,
      .rental-gate p {
        margin: 0;
        color: #555;
        font-size: 13px;
        text-transform: lowercase;
      }

      .rental-gate input {
        width: 100%;
        min-height: 38px;
        border: 1px solid #d8d8d8;
        padding: 8px 10px;
        font: inherit;
        font-size: 13px;
      }

      .rental-gate-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        min-height: 34px;
        padding: 0 14px;
        border: 1px solid #111;
        border-radius: 0;
        background: #fff;
        color: #111;
        font: inherit;
        font-size: 13px;
        font-weight: 400;
        text-transform: lowercase;
        cursor: pointer;
      }

      @media (max-width: 860px) {
        .filters {
          gap: 14px;
        }

        .filter-top {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        #status {
          text-align: left;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 30px 8px;
        }
      }

      @media (max-width: 560px) {
        .site-header-inner,
        main {
          width: calc(100% - 20px);
        }

        .grid {
          grid-template-columns: 1fr;
          gap: 32px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="./" aria-label="athoce home">
          <img src="assets/athoce-symbol.svg" alt="" />
        </a>
      </div>
    </header>
    <main>
      <section class="filters" aria-label="상품 필터">
        <div class="filter-top">
          <nav id="categoryFilters" class="category-filters" aria-label="카테고리"></nav>
          <div id="status" aria-live="polite"></div>
        </div>
        <label class="soldout-filter">
          <input id="excludeUnavailable" type="checkbox" />
          hide sold products
        </label>
      </section>
      <section id="products" class="grid" aria-label="상품 목록"></section>
      <div class="more" id="moreWrap" hidden>
        <button type="button" id="loadMore">더 보기</button>
      </div>
    </main>
    <div id="rentalGate" class="rental-gate" hidden>
      <form id="rentalGateForm">
        <label for="rentalPassword">rental password</label>
        <input id="rentalPassword" type="password" autocomplete="current-password" />
        <p id="rentalGateStatus" aria-live="polite"></p>
        <div class="rental-gate-actions">
          <button type="button" id="rentalGateCancel">cancel</button>
          <button type="submit">enter</button>
        </div>
      </form>
    </div>

    <script>
      const ORIGINAL_SHOP_BASE_URL = 'https://hooman.kr';
      const RENTAL_CATEGORY_CODE = 's20260613e8746a4f236be';
      const INITIAL_RENDER_COUNT = 18;
      const RENDER_BATCH_SIZE = 24;
      const HIGH_PRIORITY_IMAGE_COUNT = 8;
      const CATEGORY_NAME_ORDER = ['aategois', 'hooman', 'cementbay', 'rental', 'athoce made'];
      const productGrid = document.querySelector('#products');
      const statusEl = document.querySelector('#status');
      const moreWrap = document.querySelector('#moreWrap');
      const loadMoreButton = document.querySelector('#loadMore');
      const categoryFiltersEl = document.querySelector('#categoryFilters');
      const excludeUnavailableEl = document.querySelector('#excludeUnavailable');
      const rentalGate = document.querySelector('#rentalGate');
      const rentalGateForm = document.querySelector('#rentalGateForm');
      const rentalPasswordEl = document.querySelector('#rentalPassword');
      const rentalGateStatusEl = document.querySelector('#rentalGateStatus');
      const rentalGateCancelButton = document.querySelector('#rentalGateCancel');
      const priceFormatter = new Intl.NumberFormat('ko-KR');
      let allProductsState = [];
      let productsState = [];
      let displayState = {};
      let renderedCount = 0;
      let categoriesState = [];
      let activeCategoryCode = '';
      let pendingRentalCategoryCode = '';
      let lockedCategoryCodes = new Set();

      function pickFirst(...values) {
        return values.find((value) => value !== undefined && value !== null && value !== '');
      }

      function formatDisplayText(value) {
        return String(value || '').replace(/[A-Z]/g, (letter) => letter.toLowerCase());
      }

      function getProductId(product) {
        return pickFirst(
          product.prodNo,
          product.idx,
          product.id,
          product.productNo,
          product.product_no,
          product.code,
        );
      }

      function getProductName(product) {
        return formatDisplayText(
          pickFirst(product.name, product.productName, product.product_name, '이름 없는 상품'),
        );
      }

      function getProductPrice(product) {
        return Number(
          pickFirst(product.price, product.salePrice, product.sale_price, product.originPrice, 0),
        );
      }

      function getProductImage(product) {
        const images = pickFirst(
          product.productImages,
          product.images,
          product.imageList,
          product.image_list,
          [],
        );
        const firstImage = Array.isArray(images) ? images[0] : null;

        return pickFirst(
          product.image_url,
          product.imageUrl,
          product.thumbnail_url,
          product.thumbnailUrl,
          product.thumbnail,
          product.mainImage,
          product.main_image,
          firstImage?.url,
          firstImage?.image_url,
          firstImage,
          '',
        );
      }

      function getProductHoverImage(product) {
        return pickFirst(product.hoverImageUrl, product.hover_image_url, '');
      }

      function isUnavailable(product) {
        const status = String(product.prodStatus || '').toLowerCase();
        const stockUse = String(product.stockUse || '').toUpperCase() === 'Y';
        const stockUnlimit = String(product.stockUnlimit || '').toUpperCase() === 'Y';
        const stock = Number(product.stockNoOption ?? product.stock ?? product.stockCount);

        return (
          status === 'soldout' ||
          status === 'nosale' ||
          (stockUse && !stockUnlimit && Number.isFinite(stock) && stock <= 0)
        );
      }

      function normalizeCategoryName(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[-_]+/g, ' ')
          .replace(/\s+/g, ' ');
      }

      function getCategoryNameRank(category) {
        const normalizedName = normalizeCategoryName(category.name);
        const exactRank = CATEGORY_NAME_ORDER.indexOf(normalizedName);

        if (exactRank >= 0) {
          return exactRank;
        }

        const partialRank = CATEGORY_NAME_ORDER.findIndex((name) => normalizedName.includes(name));
        return partialRank >= 0 ? partialRank : Infinity;
      }

      function flattenCategories(items = [], depth = 0, parentName = '') {
        return items.flatMap((item) => {
          const current = {
            name: item.name || '',
            categoryCode: String(item.categoryCode || ''),
            depth,
            parentName,
          };

          return [
            current,
            ...flattenCategories(item.children || [], depth + 1, item.name || parentName),
          ];
        });
      }

      function findAthoceBranch(items = []) {
        for (const item of items) {
          if (normalizeCategoryName(item.name) === 'athoce') {
            return item.children?.length ? item.children : [];
          }

          const childBranch = findAthoceBranch(item.children || []);

          if (childBranch.length) {
            return childBranch;
          }
        }

        return [];
      }

      function getVisibleCategories(categoryTree = [], display = {}) {
        const athoceBranch = findAthoceBranch(categoryTree);
        const source = athoceBranch.length ? athoceBranch : categoryTree;
        const flattened = flattenCategories(source);
        const allowedCodes = new Set((display.homeCategoryCodes || []).map(String));
        const order = (display.categoryButtonOrder || []).map(String).filter(Boolean);
        const orderRank = new Map(order.map((code, index) => [code, index]));
        const categories = flattened
          .filter((category) => category.categoryCode)
          .filter((category) => !allowedCodes.size || allowedCodes.has(category.categoryCode));

        return categories.sort((a, b) => {
          const aRank = orderRank.has(a.categoryCode) ? orderRank.get(a.categoryCode) : Infinity;
          const bRank = orderRank.has(b.categoryCode) ? orderRank.get(b.categoryCode) : Infinity;

          if (aRank !== bRank) {
            return aRank - bRank;
          }

          const aNameRank = getCategoryNameRank(a);
          const bNameRank = getCategoryNameRank(b);

          if (aNameRank !== bNameRank) {
            return aNameRank - bNameRank;
          }

          return 0;
        });
      }

      function productHasCategory(product, categoryCode) {
        if (!categoryCode) {
          return true;
        }

        const categories = Array.isArray(product.categories) ? product.categories.map(String) : [];
        return categories.includes(String(categoryCode));
      }

      function isLockedCategory(categoryCode) {
        return lockedCategoryCodes.has(String(categoryCode));
      }

      function showRentalGate(categoryCode) {
        pendingRentalCategoryCode = categoryCode;
        rentalGate.hidden = false;
        rentalGateStatusEl.textContent = '';
        rentalPasswordEl.value = '';
        rentalPasswordEl.focus();
      }

      function hideRentalGate() {
        rentalGate.hidden = true;
        rentalGateStatusEl.textContent = '';
        rentalPasswordEl.value = '';
        pendingRentalCategoryCode = '';
      }

      function getDetailUrl(product) {
        const productId = getProductId(product);
        return productId ? `detail.html?prodNo=${encodeURIComponent(productId)}` : ORIGINAL_SHOP_BASE_URL;
      }

      function renderProduct(product, display = {}, index = 0) {
        const unavailable = isUnavailable(product);
        const link = document.createElement('a');
        const imageUrl = getProductImage(product);
        const hoverImageUrl = getProductHoverImage(product);
        link.className = [
          'product',
          unavailable && display.blurUnavailable !== false ? 'is-unavailable' : '',
          hoverImageUrl && hoverImageUrl !== imageUrl ? 'has-hover-image' : '',
        ]
          .filter(Boolean)
          .join(' ');
        link.href = getDetailUrl(product);

        const name = getProductName(product);
        const price = getProductPrice(product);

        const thumb = document.createElement('div');
        thumb.className = 'thumb';

        if (imageUrl) {
          const image = document.createElement('img');
          image.src = imageUrl;
          image.referrerPolicy = 'no-referrer';
          image.alt = name;
          image.loading = index < HIGH_PRIORITY_IMAGE_COUNT ? 'eager' : 'lazy';
          image.decoding = 'async';
          image.fetchPriority = index < HIGH_PRIORITY_IMAGE_COUNT ? 'high' : 'auto';
          thumb.append(image);

          if (hoverImageUrl && hoverImageUrl !== imageUrl) {
            const hoverImage = document.createElement('img');
            hoverImage.src = hoverImageUrl;
            hoverImage.referrerPolicy = 'no-referrer';
            hoverImage.alt = '';
            hoverImage.loading = 'lazy';
            hoverImage.decoding = 'async';
            thumb.append(hoverImage);
          }
        }

        const info = document.createElement('div');
        info.className = 'info';
        const nameEl = document.createElement('p');
        const priceEl = document.createElement('p');
        const statusEl = document.createElement('p');

        nameEl.className = 'name';
        nameEl.textContent = name;
        priceEl.className = 'price';
        priceEl.textContent =
          unavailable && display.hideUnavailablePrice !== false
            ? 'sold out'
            : price
              ? `${priceFormatter.format(price)}원`
              : '가격 문의';
        statusEl.className = 'status';
        statusEl.textContent = '';

        info.append(nameEl, priceEl, statusEl);
        link.append(thumb, info);

        return link;
      }

      function updateStatus() {
        const categoryName =
          categoriesState.find((category) => category.categoryCode === activeCategoryCode)?.name || 'all';
        statusEl.textContent = `${formatDisplayText(categoryName)} · ${Math.min(renderedCount, productsState.length)} / ${productsState.length}개 상품`;
        moreWrap.hidden = renderedCount >= productsState.length;
      }

      function renderCategoryFilters() {
        const buttons = [
          {
            name: 'all',
            categoryCode: '',
          },
          ...categoriesState,
        ].map((category) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.textContent = formatDisplayText(category.name);
          button.dataset.categoryCode = category.categoryCode;
          button.className = category.categoryCode === activeCategoryCode ? 'is-active' : '';
          button.addEventListener('click', () => {
            if (isLockedCategory(category.categoryCode)) {
              showRentalGate(category.categoryCode);
              return;
            }

            activeCategoryCode = category.categoryCode;
            applyFilters();
          });

          return button;
        });

        categoryFiltersEl.replaceChildren(...buttons);
      }

      function applyFilters() {
        const excludeUnavailable = excludeUnavailableEl.checked;

        productsState = allProductsState.filter((product) => {
          return (
            productHasCategory(product, activeCategoryCode) &&
            (!excludeUnavailable || !isUnavailable(product))
          );
        });
        renderCategoryFilters();

        productGrid.innerHTML = '';
        renderedCount = 0;

        if (!productsState.length) {
          productGrid.className = '';
          productGrid.innerHTML = '<div class="empty">표시할 상품이 없습니다.</div>';
          updateStatus();
          return;
        }

        productGrid.className = 'grid';
        renderNextBatch();
      }

      function renderNextBatch() {
        const start = renderedCount;
        const nextCount = start ? RENDER_BATCH_SIZE : INITIAL_RENDER_COUNT;
        const nextProducts = productsState.slice(start, start + nextCount);
        const nodes = nextProducts.map((product, index) =>
          renderProduct(product, displayState, start + index),
        );

        productGrid.append(...nodes);
        renderedCount += nodes.length;
        updateStatus();
      }

      async function loadProducts() {
        statusEl.textContent = '상품을 불러오는 중';
        productGrid.innerHTML = '';
        moreWrap.hidden = true;
        renderedCount = 0;

        try {
          const pageParams = new URLSearchParams(window.location.search);
          const categoryCode = pageParams.get('categoryCode');
          const apiUrl = new URL('/api/products', window.location.origin);

          if (categoryCode) {
            apiUrl.searchParams.set('categoryCode', categoryCode);
          }

          const response = await fetch(apiUrl.pathname + apiUrl.search, {
            credentials: 'same-origin',
            headers: { accept: 'application/json' },
          });
          const categoriesRequest = fetch('/api/categories', {
            headers: { accept: 'application/json' },
          });
          const text = await response.text();
          const payload = text ? JSON.parse(text) : {};

          if (!response.ok || !payload.ok) {
            throw new Error(
              payload?.error?.message ||
                `/api/products 요청 실패: http ${response.status || '응답 없음'}`,
            );
          }

          const categoriesResponse = await categoriesRequest;
          const categoriesText = await categoriesResponse.text();
          const categoriesPayload = categoriesText ? JSON.parse(categoriesText) : {};

          if (!categoriesResponse.ok || !categoriesPayload.ok) {
            throw new Error(
              categoriesPayload?.error?.message ||
                `/api/categories 요청 실패: http ${categoriesResponse.status || '응답 없음'}`,
            );
          }

          allProductsState = Array.isArray(payload.items) ? payload.items : [];
          displayState = payload.display || {};
          lockedCategoryCodes = new Set((displayState.lockedCategoryCodes || []).map(String));
          categoriesState = getVisibleCategories(categoriesPayload.items || [], displayState);
          excludeUnavailableEl.checked = displayState.excludeUnavailableByDefault !== false;
          statusEl.textContent = `${allProductsState.length}개 상품`;
          renderCategoryFilters();
          applyFilters();

          return;
        } catch (error) {
          statusEl.textContent = '';
          productGrid.className = '';
          productGrid.innerHTML = `<div class="error">${formatDisplayText(error.message)}</div>`;
        }
      }

      loadMoreButton.addEventListener('click', renderNextBatch);
      excludeUnavailableEl.addEventListener('change', applyFilters);
      rentalGateCancelButton.addEventListener('click', hideRentalGate);
      rentalGateForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        rentalGateStatusEl.textContent = 'checking';

        try {
          const response = await fetch('/api/rental/login', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {
              accept: 'application/json',
              'content-type': 'application/json',
            },
            body: JSON.stringify({ password: rentalPasswordEl.value }),
          });
          const text = await response.text();
          const payload = text ? JSON.parse(text) : {};

          if (!response.ok || !payload.ok) {
            throw new Error(payload?.error?.message || 'password is not correct.');
          }

          const targetCategoryCode = pendingRentalCategoryCode || RENTAL_CATEGORY_CODE;
          hideRentalGate();
          activeCategoryCode = targetCategoryCode;
          await loadProducts();
        } catch (error) {
          rentalGateStatusEl.textContent = formatDisplayText(error.message);
        }
      });
      loadProducts();
    </script>
  </body>
</html>
