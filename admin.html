<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>Athoce Admin</title>
    <style>
      :root {
        color: #171717;
        background: #f6f6f6;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      [hidden] {
        display: none !important;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 16px;
        letter-spacing: 0;
      }

      section {
        display: grid;
        gap: 14px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      a {
        color: inherit;
        font-size: 14px;
        text-underline-offset: 3px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 18px;
        align-items: start;
      }

      .panel,
      .sidebar {
        border: 1px solid #e3e3e3;
        border-radius: 8px;
        background: #fff;
      }

      .panel {
        display: grid;
        gap: 22px;
        padding: 22px;
      }

      .sidebar {
        position: sticky;
        top: 20px;
        padding: 18px;
      }

      .login-panel {
        display: grid;
        place-items: center;
        min-height: 58vh;
      }

      .login-card {
        width: min(420px, 100%);
        display: grid;
        gap: 18px;
        padding: 24px;
        border: 1px solid #e3e3e3;
        border-radius: 8px;
        background: #fff;
      }

      .login-card p {
        margin: 0;
        color: #5f6368;
        font-size: 14px;
        line-height: 1.5;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label,
      legend {
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 40px;
        padding: 9px 10px;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        font: inherit;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      fieldset {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .checks {
        display: grid;
        gap: 8px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 28px;
        font-size: 14px;
        font-weight: 400;
      }

      .check input {
        width: 16px;
        min-height: 16px;
        margin: 0;
      }

      .child {
        margin-left: 18px;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid #171717;
        border-radius: 8px;
        background: #171717;
        color: #fff;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button.secondary {
        border-color: #d8d8d8;
        background: #fff;
        color: #171717;
      }

      button.subtle {
        min-height: 34px;
        padding: 0 10px;
        border-color: #d8d8d8;
        background: #fff;
        color: #171717;
        font-size: 13px;
      }

      #status {
        min-height: 22px;
        color: #5f6368;
        font-size: 13px;
      }

      .health {
        display: grid;
        gap: 10px;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid #e3e3e3;
      }

      .health h2 {
        margin-bottom: 0;
      }

      .health dl {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 10px;
        margin: 0;
        font-size: 13px;
      }

      .health dt {
        color: #5f6368;
      }

      .health dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      .rental-key-create,
      .rental-key-list,
      .rental-log-list {
        display: grid;
        gap: 10px;
      }

      .rental-key-create {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .rental-key-create .wide {
        grid-column: 1 / -1;
      }

      .rental-key-card,
      .rental-log-card {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid #e3e3e3;
        border-radius: 8px;
        background: #fafafa;
      }

      .rental-key-card header {
        margin: 0;
      }

      .rental-key-card .actions {
        flex-wrap: wrap;
      }

      .rental-log-card {
        color: #4f4f4f;
        font-size: 13px;
      }

      .error {
        color: #b3261e;
      }

      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Athoce Admin</h1>
        <div class="header-actions">
          <a href="./">storefront</a>
          <button id="logout" class="subtle" type="button" hidden>로그아웃</button>
        </div>
      </header>

      <section id="loginPanel" class="login-panel" hidden>
        <form id="loginForm" class="login-card">
          <div>
            <h2>관리자 로그인</h2>
            <p>공유받은 관리자 비밀번호를 입력하면 이 기기에서 24시간 동안 유지됩니다.</p>
          </div>
          <div class="field">
            <label for="loginPassword">비밀번호</label>
            <input
              id="loginPassword"
              type="password"
              autocomplete="current-password"
              inputmode="text"
            />
          </div>
          <button id="loginButton" type="submit">로그인</button>
          <button class="secondary" type="button" data-reconnect-imweb>reconnect imweb</button>
          <p id="loginStatus" class="error" aria-live="polite"></p>
        </form>
      </section>

      <div id="adminApp" class="layout" hidden>
        <form id="settings" class="panel">
          <section>
            <h2>상품 노출</h2>
            <fieldset>
              <legend>카테고리</legend>
              <div id="categories" class="checks"></div>
            </fieldset>
            <div class="field">
              <label for="categoryButtonOrder">홈 카테고리 버튼 순서 categoryCode</label>
              <textarea id="categoryButtonOrder" name="categoryButtonOrder"></textarea>
            </div>
          </section>

          <section>
            <h2>상태</h2>
            <div class="checks">
              <label class="check"><input type="checkbox" name="statusFilter" value="sale" /> 판매중</label>
              <label class="check"><input type="checkbox" name="statusFilter" value="soldout" /> 품절</label>
              <label class="check"><input type="checkbox" name="statusFilter" value="nosale" /> 판매 안 함</label>
            </div>
          </section>

          <section>
            <h2>정렬</h2>
            <div class="field">
              <label for="sortMode">상품 순서</label>
              <select id="sortMode" name="sortMode">
                <option value="imweb">Imweb 정렬</option>
                <option value="newest">최신순</option>
                <option value="price-low">낮은 가격순</option>
                <option value="price-high">높은 가격순</option>
                <option value="name">이름순</option>
              </select>
            </div>
          </section>

          <section>
            <h2>표시</h2>
            <div class="field">
              <label for="maxItems">최대 상품 수</label>
              <input id="maxItems" name="maxItems" type="number" min="1" max="100" step="1" />
            </div>
            <div class="checks">
              <label class="check">
                <input type="checkbox" id="blurUnavailable" name="blurUnavailable" />
                품절/재고 0 이미지 블러
              </label>
              <label class="check">
                <input type="checkbox" id="hideUnavailablePrice" name="hideUnavailablePrice" />
                품절/재고 0 가격 숨김
              </label>
              <label class="check">
                <input type="checkbox" id="excludeUnavailableByDefault" name="excludeUnavailableByDefault" />
                홈에서 sold out 기본 제외
              </label>
            </div>
          </section>

          <section>
            <h2>상품 번호</h2>
            <div class="field">
              <label for="pinnedProductNos">상단 고정 prodNo</label>
              <textarea id="pinnedProductNos" name="pinnedProductNos"></textarea>
            </div>
            <div class="field">
              <label for="hiddenProductNos">숨김 prodNo</label>
              <textarea id="hiddenProductNos" name="hiddenProductNos"></textarea>
            </div>
          </section>

          <section>
            <h2>rental access keys</h2>
            <div class="rental-key-create">
              <div class="field">
                <label for="rentalKeyLabel">client label</label>
                <input id="rentalKeyLabel" type="text" placeholder="brand a director" />
              </div>
              <div class="field">
                <label for="rentalKeyValue">key value</label>
                <input id="rentalKeyValue" type="text" placeholder="private access key" />
              </div>
              <div class="field wide">
                <label for="rentalKeyNote">note</label>
                <textarea id="rentalKeyNote" placeholder="project, season, contact memo"></textarea>
              </div>
              <label class="check"><input id="rentalKeyActive" type="checkbox" checked /> active</label>
              <button id="addRentalKey" type="button">add key</button>
            </div>
            <div id="rentalKeys" class="rental-key-list"></div>
            <h2>rental usage</h2>
            <div id="rentalLogs" class="rental-log-list"></div>
          </section>
        </form>

        <aside class="sidebar">
          <div class="actions">
            <button id="save" type="button">저장</button>
            <button id="reload" class="secondary" type="button">새로고침</button>
          </div>
          <p id="status" aria-live="polite"></p>
          <section class="health" aria-labelledby="tokenHealthTitle">
            <h2 id="tokenHealthTitle">Imweb token</h2>
            <dl id="tokenHealth">
              <dt>status</dt>
              <dd>확인 전</dd>
            </dl>
            <div class="actions">
              <button id="refreshToken" class="secondary" type="button">refresh test</button>
              <button id="telegramTest" class="secondary" type="button">telegram test</button>
              <button class="secondary" type="button" data-reconnect-imweb>reconnect imweb</button>
            </div>
          </section>
        </aside>
      </div>
    </main>

    <script>
      const adminApp = document.querySelector('#adminApp');
      const loginPanel = document.querySelector('#loginPanel');
      const loginForm = document.querySelector('#loginForm');
      const loginPasswordEl = document.querySelector('#loginPassword');
      const loginStatusEl = document.querySelector('#loginStatus');
      const form = document.querySelector('#settings');
      const categoriesEl = document.querySelector('#categories');
      const statusEl = document.querySelector('#status');
      const logoutButton = document.querySelector('#logout');
      const saveButton = document.querySelector('#save');
      const reloadButton = document.querySelector('#reload');
      const tokenHealthEl = document.querySelector('#tokenHealth');
      const refreshTokenButton = document.querySelector('#refreshToken');
      const telegramTestButton = document.querySelector('#telegramTest');
      const reconnectImwebButtons = document.querySelectorAll('[data-reconnect-imweb]');
      const rentalKeyLabelEl = document.querySelector('#rentalKeyLabel');
      const rentalKeyValueEl = document.querySelector('#rentalKeyValue');
      const rentalKeyNoteEl = document.querySelector('#rentalKeyNote');
      const rentalKeyActiveEl = document.querySelector('#rentalKeyActive');
      const addRentalKeyButton = document.querySelector('#addRentalKey');
      const rentalKeysEl = document.querySelector('#rentalKeys');
      const rentalLogsEl = document.querySelector('#rentalLogs');

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.className = isError ? 'error' : '';
      }

      function setLoginStatus(message, isError = false) {
        loginStatusEl.textContent = message;
        loginStatusEl.className = isError ? 'error' : '';
      }

      function showLogin(message = '', isError = false) {
        adminApp.hidden = true;
        logoutButton.hidden = true;
        loginPanel.hidden = false;
        setStatus('');
        setLoginStatus(message, isError);
        loginPasswordEl.focus();
      }

      function showAdmin() {
        loginPanel.hidden = true;
        adminApp.hidden = false;
        logoutButton.hidden = false;
      }

      function parseNumberList(value) {
        return String(value || '')
          .split(/[\s,]+/)
          .map((item) => item.trim())
          .filter(Boolean)
          .map((item) => Number(item.trim()))
          .filter((item) => Number.isFinite(item) && item > 0);
      }

      function parseStringList(value) {
        return String(value || '')
          .split(/[\s,]+/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function formatNumberList(values) {
        return Array.isArray(values) ? values.join('\n') : '';
      }

      function formatStringList(values) {
        return Array.isArray(values) ? values.join('\n') : '';
      }

      function formatDateTime(value) {
        if (!value) {
          return '-';
        }

        const date = new Date(value);

        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return date.toLocaleString('ko-KR', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
        });
      }

      function formatExpiresIn(seconds) {
        if (seconds === null || seconds === undefined || Number.isNaN(Number(seconds))) {
          return '-';
        }

        if (seconds < 0) {
          return 'expired';
        }

        const minutes = Math.floor(seconds / 60);

        if (minutes < 60) {
          return `${minutes}분`;
        }

        return `${Math.floor(minutes / 60)}시간 ${minutes % 60}분`;
      }

      function formatDuration(seconds) {
        if (seconds === null || seconds === undefined || Number.isNaN(Number(seconds))) {
          return '-';
        }

        if (seconds < 60) {
          return `${Math.max(0, seconds)}초`;
        }

        return formatExpiresIn(seconds);
      }

      function flattenCategories(items = [], depth = 0) {
        return items.flatMap((item) => [
          { name: item.name, categoryCode: item.categoryCode, depth },
          ...flattenCategories(item.children || [], depth + 1),
        ]);
      }

      function renderCategories(items, selected = []) {
        const selectedSet = new Set(selected);
        const flattened = flattenCategories(items);

        categoriesEl.replaceChildren(
          ...flattened.map((category) => {
            const label = document.createElement('label');
            label.className = `check${category.depth ? ' child' : ''}`;

            const input = document.createElement('input');
            input.type = 'checkbox';
            input.name = 'categoryCodes';
            input.value = category.categoryCode;
            input.checked = selectedSet.has(category.categoryCode);

            label.append(
              input,
              document.createTextNode(`${category.name} (${category.categoryCode})`),
            );
            return label;
          }),
        );
      }

      function renderCategoryLoadError(selected = [], message = '') {
        categoriesEl.replaceChildren(
          ...selected.map((categoryCode) => {
            const label = document.createElement('label');
            label.className = 'check';

            const input = document.createElement('input');
            input.type = 'checkbox';
            input.name = 'categoryCodes';
            input.value = categoryCode;
            input.checked = true;

            label.append(input, document.createTextNode(categoryCode));
            return label;
          }),
        );

        const note = document.createElement('p');
        note.className = 'error';
        note.textContent = message || '카테고리 목록을 불러오지 못했습니다. Imweb 재연결 후 새로고침하세요.';
        categoriesEl.append(note);
      }

      function applyConfig(config) {
        form.sortMode.value = config.sortMode || 'imweb';
        form.maxItems.value = config.maxItems || 100;
        form.blurUnavailable.checked = config.blurUnavailable !== false;
        form.hideUnavailablePrice.checked = config.hideUnavailablePrice !== false;
        form.excludeUnavailableByDefault.checked = config.excludeUnavailableByDefault !== false;
        form.categoryButtonOrder.value = formatStringList(config.categoryButtonOrder);
        form.pinnedProductNos.value = formatNumberList(config.pinnedProductNos);
        form.hiddenProductNos.value = formatNumberList(config.hiddenProductNos);

        const statuses = new Set(config.statusFilter || []);
        form.querySelectorAll('[name="statusFilter"]').forEach((input) => {
          input.checked = statuses.has(input.value);
        });
      }

      function renderTokenHealth(health = {}) {
        const rows = [
          ['source', health.tokenSource || '-'],
          ['kv', health.kvConfigured ? 'connected' : 'not connected'],
          ['access', health.hasAccessToken ? 'configured' : 'missing'],
          ['refresh', health.hasRefreshToken ? 'configured' : 'missing'],
          ['refreshed ago', formatDuration(health.refreshedAgoSeconds)],
          ['refresh interval', formatDuration(health.refreshIntervalSeconds)],
          ['refresh needed', health.refreshRecommended ? 'yes' : 'no'],
          ['expires in', formatExpiresIn(health.expiresInSeconds)],
          ['updated', formatDateTime(health.updatedAt)],
          ['last failure', formatDateTime(health.lastRefreshFailedAt)],
          ['last error', health.lastRefreshError?.message || '-'],
        ];

        tokenHealthEl.replaceChildren(
          ...rows.flatMap(([label, value]) => {
            const dt = document.createElement('dt');
            const dd = document.createElement('dd');
            dt.textContent = label;
            dd.textContent = value;
            return [dt, dd];
          }),
        );
      }

      function renderRentalLogs(logs = []) {
        if (!logs.length) {
          rentalLogsEl.innerHTML = '<p>기록이 없습니다.</p>';
          return;
        }

        rentalLogsEl.replaceChildren(
          ...logs.slice(0, 20).map((log) => {
            const card = document.createElement('div');
            card.className = 'rental-log-card';
            card.textContent = [
              `${formatDateTime(log.time)} · ${log.event}`,
              `${log.label || log.keyId || '-'} · ${log.success ? 'success' : 'failed'}`,
              log.itemCount ? `${log.itemCount} items` : '',
              `ip ${log.ipHash || '-'}`,
            ].filter(Boolean).join(' / ');
            return card;
          }),
        );
      }

      function renderRentalKeys(keys = [], logs = []) {
        if (!keys.length) {
          rentalKeysEl.innerHTML = '<p>등록된 client key가 없습니다.</p>';
        } else {
          rentalKeysEl.replaceChildren(
            ...keys.map((key) => {
              const card = document.createElement('div');
              const head = document.createElement('header');
              const title = document.createElement('h2');
              const activeLabel = document.createElement('label');
              const activeInput = document.createElement('input');
              const labelField = document.createElement('input');
              const keyField = document.createElement('input');
              const noteField = document.createElement('textarea');
              const meta = document.createElement('p');
              const actions = document.createElement('div');
              const saveButton = document.createElement('button');
              const toggleButton = document.createElement('button');
              const deleteButton = document.createElement('button');

              card.className = 'rental-key-card';
              title.textContent = key.label || key.id;
              activeLabel.className = 'check';
              activeInput.type = 'checkbox';
              activeInput.checked = key.active !== false;
              activeLabel.append(activeInput, document.createTextNode('active'));
              head.append(title, activeLabel);

              labelField.value = key.label || '';
              keyField.value = key.key || '';
              noteField.value = key.note || '';
              labelField.placeholder = 'client label';
              keyField.placeholder = 'key value';
              noteField.placeholder = 'note';
              meta.textContent = [
                `id ${key.id}`,
                `uses ${key.useCount || 0}`,
                `last ${formatDateTime(key.lastUsedAt)}`,
              ].join(' / ');

              actions.className = 'actions';
              saveButton.type = 'button';
              saveButton.textContent = 'save';
              toggleButton.type = 'button';
              toggleButton.className = 'secondary';
              toggleButton.textContent = key.active === false ? 'activate' : 'deactivate';
              deleteButton.type = 'button';
              deleteButton.className = 'secondary';
              deleteButton.textContent = 'delete';

              saveButton.addEventListener('click', () =>
                saveRentalKey(key.id, {
                  label: labelField.value,
                  key: keyField.value,
                  note: noteField.value,
                  active: activeInput.checked,
                }),
              );
              toggleButton.addEventListener('click', () =>
                saveRentalKey(key.id, { active: key.active === false }),
              );
              deleteButton.addEventListener('click', () => deleteRentalKey(key.id));

              actions.append(saveButton, toggleButton, deleteButton);
              card.append(head, labelField, keyField, noteField, meta, actions);
              return card;
            }),
          );
        }

        renderRentalLogs(logs);
      }

      function collectConfig() {
        return {
          categoryCodes: [...form.querySelectorAll('[name="categoryCodes"]:checked')].map(
            (input) => input.value,
          ),
          statusFilter: [...form.querySelectorAll('[name="statusFilter"]:checked')].map(
            (input) => input.value,
          ),
          sortMode: form.sortMode.value,
          maxItems: Number(form.maxItems.value || 100),
          categoryButtonOrder: parseStringList(form.categoryButtonOrder.value),
          pinnedProductNos: parseNumberList(form.pinnedProductNos.value),
          hiddenProductNos: parseNumberList(form.hiddenProductNos.value),
          excludeUnavailableByDefault: form.excludeUnavailableByDefault.checked,
          blurUnavailable: form.blurUnavailable.checked,
          hideUnavailablePrice: form.hideUnavailablePrice.checked,
        };
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, {
          credentials: 'same-origin',
          ...options,
        });
        const text = await response.text();
        let payload = {};

        try {
          payload = text ? JSON.parse(text) : {};
        } catch {
          payload = {
            ok: false,
            error: {
              message: `HTTP ${response.status}`,
            },
          };
        }

        if (!response.ok || !payload.ok) {
          const error = new Error(payload?.error?.message || `HTTP ${response.status}`);
          error.status = response.status;
          error.code = payload?.error?.code;
          throw error;
        }

        return payload;
      }

      function handleSessionError(error) {
        if (error?.status === 401 || error?.code === 'UNAUTHORIZED') {
          showLogin(error.message || '다시 로그인해주세요.', true);
          return;
        }

        setStatus(error.message || '요청을 처리하지 못했습니다.', true);
      }

      async function checkSession() {
        try {
          const payload = await fetchJson('/api/admin/session');

          if (!payload.adminConfigured) {
            showLogin('Cloudflare Pages 환경변수 ADMIN_PASSWORD 또는 ADMIN_PASSWORDS를 먼저 설정하세요.', true);
            return;
          }

          if (!payload.authenticated) {
            showLogin();
            return;
          }

          showAdmin();
          await load();
        } catch (error) {
          showLogin(error.message, true);
        }
      }

      async function login(event) {
        event.preventDefault();
        setLoginStatus('로그인 중입니다.');

        try {
          await fetchJson('/api/admin/login', {
            method: 'POST',
            headers: {
              accept: 'application/json',
              'content-type': 'application/json',
            },
            body: JSON.stringify({ password: loginPasswordEl.value }),
          });

          loginPasswordEl.value = '';
          showAdmin();
          await load();
        } catch (error) {
          setLoginStatus(error.message, true);
        }
      }

      async function logout() {
        try {
          await fetchJson('/api/admin/logout', {
            method: 'POST',
            headers: {
              accept: 'application/json',
            },
          });
        } finally {
          showLogin('로그아웃되었습니다.');
        }
      }

      async function load() {
        setStatus('불러오는 중입니다.');
        loadTokenHealth();
        loadRentalKeys();

        try {
          const configPayload = await fetchJson('/api/admin/config');
          applyConfig(configPayload.config);

          try {
            const categoriesPayload = await fetchJson('/api/categories');
            renderCategories(categoriesPayload.items || [], configPayload.config.categoryCodes || []);
            setStatus('불러왔습니다.');
          } catch (categoryError) {
            renderCategoryLoadError(
              configPayload.config.categoryCodes || [],
              categoryError.message || '카테고리 목록을 불러오지 못했습니다.',
            );
            setStatus('Imweb 토큰 또는 카테고리 로드에 문제가 있습니다. reconnect imweb을 실행하세요.', true);
          }

        } catch (error) {
          handleSessionError(error);
        }
      }

      async function loadRentalKeys() {
        try {
          const payload = await fetchJson('/api/admin/rental-keys');
          renderRentalKeys(payload.keys || [], payload.logs || []);
        } catch (error) {
          if (error?.status === 401 || error?.code === 'UNAUTHORIZED') {
            return;
          }

          rentalKeysEl.innerHTML = '<p class="error">rental key를 불러오지 못했습니다.</p>';
        }
      }

      async function addRentalKey() {
        setStatus('rental key 저장 중입니다.');
        addRentalKeyButton.disabled = true;

        try {
          const payload = await fetchJson('/api/admin/rental-keys', {
            method: 'POST',
            headers: {
              accept: 'application/json',
              'content-type': 'application/json',
            },
            body: JSON.stringify({
              action: 'create',
              key: {
                label: rentalKeyLabelEl.value,
                key: rentalKeyValueEl.value,
                note: rentalKeyNoteEl.value,
                active: rentalKeyActiveEl.checked,
              },
            }),
          });

          rentalKeyLabelEl.value = '';
          rentalKeyValueEl.value = '';
          rentalKeyNoteEl.value = '';
          rentalKeyActiveEl.checked = true;
          renderRentalKeys(payload.keys || [], payload.logs || []);
          setStatus('rental key를 저장했습니다.');
        } catch (error) {
          handleSessionError(error);
        } finally {
          addRentalKeyButton.disabled = false;
        }
      }

      async function saveRentalKey(id, patch) {
        setStatus('rental key 저장 중입니다.');

        try {
          const payload = await fetchJson('/api/admin/rental-keys', {
            method: 'POST',
            headers: {
              accept: 'application/json',
              'content-type': 'application/json',
            },
            body: JSON.stringify({ action: 'update', id, patch }),
          });
          renderRentalKeys(payload.keys || [], payload.logs || []);
          setStatus('rental key를 저장했습니다.');
        } catch (error) {
          handleSessionError(error);
        }
      }

      async function deleteRentalKey(id) {
        setStatus('rental key 삭제 중입니다.');

        try {
          const payload = await fetchJson('/api/admin/rental-keys', {
            method: 'POST',
            headers: {
              accept: 'application/json',
              'content-type': 'application/json',
            },
            body: JSON.stringify({ action: 'delete', id }),
          });
          renderRentalKeys(payload.keys || [], payload.logs || []);
          setStatus('rental key를 삭제했습니다.');
        } catch (error) {
          handleSessionError(error);
        }
      }

      async function save() {
        setStatus('저장 중입니다.');

        try {
          const payload = await fetchJson('/api/admin/config', {
            method: 'POST',
            headers: {
              accept: 'application/json',
              'content-type': 'application/json',
            },
            body: JSON.stringify({ config: collectConfig() }),
          });

          applyConfig(payload.config);
          setStatus('저장했습니다.');
        } catch (error) {
          handleSessionError(error);
        }
      }

      async function loadTokenHealth() {
        try {
          const payload = await fetchJson('/api/admin/imweb-health');
          renderTokenHealth(payload.health);
        } catch (error) {
          if (error?.status === 401 || error?.code === 'UNAUTHORIZED') {
            return;
          }

          renderTokenHealth({
            tokenSource: 'unknown',
            lastRefreshError: {
              message: error.message || '토큰 상태를 확인하지 못했습니다.',
            },
          });
        }
      }

      async function refreshToken() {
        setStatus('토큰 갱신을 확인하는 중입니다.');
        refreshTokenButton.disabled = true;

        try {
          const payload = await fetchJson('/api/admin/imweb-health', {
            method: 'POST',
            headers: {
              accept: 'application/json',
            },
          });

          renderTokenHealth(payload.health);
          setStatus(payload.refreshed?.storedInKv ? '토큰 갱신 확인 완료.' : '토큰 갱신 확인 완료. KV 저장은 확인되지 않았습니다.');
        } catch (error) {
          try {
            const healthPayload = await fetchJson('/api/admin/imweb-health');
            renderTokenHealth(healthPayload.health);
          } catch {
            // Keep the previous health display when the follow-up read also fails.
          }

          handleSessionError(error);
        } finally {
          refreshTokenButton.disabled = false;
        }
      }

      async function testTelegram() {
        setStatus('텔레그램 테스트 메시지를 보내는 중입니다.');
        telegramTestButton.disabled = true;

        try {
          await fetchJson('/api/admin/telegram-test', {
            method: 'POST',
            headers: {
              accept: 'application/json',
            },
          });
          setStatus('텔레그램 테스트 메시지를 보냈습니다.');
        } catch (error) {
          handleSessionError(error);
        } finally {
          telegramTestButton.disabled = false;
        }
      }

      function reconnectImweb() {
        window.location.href = '/api/oauth/start';
      }

      loginForm.addEventListener('submit', login);
      form.addEventListener('submit', (event) => event.preventDefault());
      logoutButton.addEventListener('click', logout);
      saveButton.addEventListener('click', save);
      reloadButton.addEventListener('click', load);
      refreshTokenButton.addEventListener('click', refreshToken);
      telegramTestButton.addEventListener('click', testTelegram);
      addRentalKeyButton.addEventListener('click', addRentalKey);
      reconnectImwebButtons.forEach((button) => {
        button.addEventListener('click', reconnectImweb);
      });
      checkSession();
    </script>
  </body>
</html>
