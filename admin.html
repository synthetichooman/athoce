<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Athoce Admin</title>
    <style>
      :root {
        color: #171717;
        background: #f6f6f6;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 16px;
        letter-spacing: 0;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 18px;
        align-items: start;
      }

      .panel,
      .sidebar {
        border: 1px solid #e3e3e3;
        border-radius: 8px;
        background: #fff;
      }

      .panel {
        display: grid;
        gap: 22px;
        padding: 22px;
      }

      .sidebar {
        position: sticky;
        top: 20px;
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label,
      legend {
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 40px;
        padding: 9px 10px;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        font: inherit;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      fieldset {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .checks {
        display: grid;
        gap: 8px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 28px;
        font-size: 14px;
        font-weight: 400;
      }

      .check input {
        width: 16px;
        min-height: 16px;
        margin: 0;
      }

      .child {
        margin-left: 18px;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid #171717;
        border-radius: 8px;
        background: #171717;
        color: #fff;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button.secondary {
        border-color: #d8d8d8;
        background: #fff;
        color: #171717;
      }

      #status {
        min-height: 22px;
        color: #5f6368;
        font-size: 13px;
      }

      .error {
        color: #b3261e;
      }

      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Athoce Admin</h1>
        <a href="./">Storefront</a>
      </header>

      <div class="layout">
        <form id="settings" class="panel">
          <section>
            <h2>상품 노출</h2>
            <fieldset>
              <legend>카테고리</legend>
              <div id="categories" class="checks"></div>
            </fieldset>
          </section>

          <section>
            <h2>상태</h2>
            <div class="checks">
              <label class="check"><input type="checkbox" name="statusFilter" value="sale" /> 판매중</label>
              <label class="check"><input type="checkbox" name="statusFilter" value="soldout" /> 품절</label>
              <label class="check"><input type="checkbox" name="statusFilter" value="nosale" /> 판매 안 함</label>
            </div>
          </section>

          <section>
            <h2>정렬</h2>
            <div class="field">
              <label for="sortMode">상품 순서</label>
              <select id="sortMode" name="sortMode">
                <option value="imweb">Imweb 정렬</option>
                <option value="newest">최신순</option>
                <option value="price-low">낮은 가격순</option>
                <option value="price-high">높은 가격순</option>
                <option value="name">이름순</option>
              </select>
            </div>
          </section>

          <section>
            <h2>표시</h2>
            <div class="field">
              <label for="maxItems">최대 상품 수</label>
              <input id="maxItems" name="maxItems" type="number" min="1" max="100" step="1" />
            </div>
            <div class="checks">
              <label class="check">
                <input type="checkbox" id="blurUnavailable" name="blurUnavailable" />
                품절/재고 0 이미지 블러
              </label>
              <label class="check">
                <input type="checkbox" id="hideUnavailablePrice" name="hideUnavailablePrice" />
                품절/재고 0 가격 숨김
              </label>
            </div>
          </section>

          <section>
            <h2>상품 번호</h2>
            <div class="field">
              <label for="pinnedProductNos">상단 고정 prodNo</label>
              <textarea id="pinnedProductNos" name="pinnedProductNos"></textarea>
            </div>
            <div class="field">
              <label for="hiddenProductNos">숨김 prodNo</label>
              <textarea id="hiddenProductNos" name="hiddenProductNos"></textarea>
            </div>
          </section>
        </form>

        <aside class="sidebar">
          <div class="field">
            <label for="adminPassword">Admin password</label>
            <input id="adminPassword" type="password" autocomplete="current-password" />
          </div>
          <div class="actions">
            <button id="save" type="button">Save</button>
            <button id="reload" class="secondary" type="button">Reload</button>
          </div>
          <p id="status" aria-live="polite"></p>
        </aside>
      </div>
    </main>

    <script>
      const form = document.querySelector('#settings');
      const categoriesEl = document.querySelector('#categories');
      const passwordEl = document.querySelector('#adminPassword');
      const statusEl = document.querySelector('#status');
      const saveButton = document.querySelector('#save');
      const reloadButton = document.querySelector('#reload');

      passwordEl.value = localStorage.getItem('athoce_admin_password') || '';

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.className = isError ? 'error' : '';
      }

      function parseNumberList(value) {
        return String(value || '')
          .split(/[\s,]+/)
          .map((item) => item.trim())
          .filter(Boolean)
          .map((item) => Number(item.trim()))
          .filter((item) => Number.isFinite(item) && item > 0);
      }

      function formatNumberList(values) {
        return Array.isArray(values) ? values.join('\n') : '';
      }

      function flattenCategories(items = [], depth = 0) {
        return items.flatMap((item) => [
          { name: item.name, categoryCode: item.categoryCode, depth },
          ...flattenCategories(item.children || [], depth + 1),
        ]);
      }

      function renderCategories(items, selected = []) {
        const selectedSet = new Set(selected);
        const flattened = flattenCategories(items);

        categoriesEl.replaceChildren(
          ...flattened.map((category) => {
            const label = document.createElement('label');
            label.className = `check${category.depth ? ' child' : ''}`;

            const input = document.createElement('input');
            input.type = 'checkbox';
            input.name = 'categoryCodes';
            input.value = category.categoryCode;
            input.checked = selectedSet.has(category.categoryCode);

            label.append(input, document.createTextNode(category.name));
            return label;
          }),
        );
      }

      function applyConfig(config) {
        form.sortMode.value = config.sortMode || 'imweb';
        form.maxItems.value = config.maxItems || 100;
        form.blurUnavailable.checked = config.blurUnavailable !== false;
        form.hideUnavailablePrice.checked = config.hideUnavailablePrice !== false;
        form.pinnedProductNos.value = formatNumberList(config.pinnedProductNos);
        form.hiddenProductNos.value = formatNumberList(config.hiddenProductNos);

        const statuses = new Set(config.statusFilter || []);
        form.querySelectorAll('[name="statusFilter"]').forEach((input) => {
          input.checked = statuses.has(input.value);
        });
      }

      function collectConfig() {
        return {
          categoryCodes: [...form.querySelectorAll('[name="categoryCodes"]:checked')].map(
            (input) => input.value,
          ),
          statusFilter: [...form.querySelectorAll('[name="statusFilter"]:checked')].map(
            (input) => input.value,
          ),
          sortMode: form.sortMode.value,
          maxItems: Number(form.maxItems.value || 100),
          pinnedProductNos: parseNumberList(form.pinnedProductNos.value),
          hiddenProductNos: parseNumberList(form.hiddenProductNos.value),
          blurUnavailable: form.blurUnavailable.checked,
          hideUnavailablePrice: form.hideUnavailablePrice.checked,
        };
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const text = await response.text();
        const payload = text ? JSON.parse(text) : {};

        if (!response.ok || !payload.ok) {
          throw new Error(payload?.error?.message || `HTTP ${response.status}`);
        }

        return payload;
      }

      async function load() {
        setStatus('Loading');

        try {
          const [configPayload, categoriesPayload] = await Promise.all([
            fetchJson('/api/admin/config'),
            fetchJson('/api/categories'),
          ]);

          renderCategories(categoriesPayload.items || [], configPayload.config.categoryCodes || []);
          applyConfig(configPayload.config);
          setStatus(configPayload.adminPasswordConfigured ? 'Loaded' : 'ADMIN_PASSWORD required', !configPayload.adminPasswordConfigured);
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function save() {
        setStatus('Saving');
        localStorage.setItem('athoce_admin_password', passwordEl.value);

        try {
          const payload = await fetchJson('/api/admin/config', {
            method: 'POST',
            headers: {
              accept: 'application/json',
              'content-type': 'application/json',
              'x-admin-password': passwordEl.value,
            },
            body: JSON.stringify({ config: collectConfig() }),
          });

          applyConfig(payload.config);
          setStatus('Saved');
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      saveButton.addEventListener('click', save);
      reloadButton.addEventListener('click', load);
      load();
    </script>
  </body>
</html>
